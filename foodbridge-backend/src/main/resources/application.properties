spring.application.name=foodbridge-backend
spring.config.import=optional:file:.env[.properties]
debug=false
server.port=${PORT:4000}
server.servlet.context-path=/
logging.level.root=INFO
logging.level.org.springframework=INFO

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:foodbridge}
spring.data.mongodb.auto-index-creation=${MONGO_AUTO_INDEX_CREATION:false}

app.cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:5173,http://127.0.0.1:5173}
app.jwt.secret=${JWT_SECRET:foodbridge-local-development-jwt-secret-change-for-production-2026}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

app.otp.ttl-seconds=${OTP_TTL_SECONDS:300}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.matching.nearby-radius-km=${MATCHING_RADIUS_KM:10}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

management.endpoints.web.exposure.include=health,info
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
